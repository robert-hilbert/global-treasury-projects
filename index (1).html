<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Treasury Projects</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0a0f1a;color:#e2e8f0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.hub{max-width:640px;width:100%;padding:48px 40px}
h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
.sub{font-size:0.85rem;color:#64748b;margin-bottom:40px}
.projects{display:flex;flex-direction:column;gap:12px}
a.project{
  display:block;padding:18px 20px;border-radius:12px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  text-decoration:none;color:#e2e8f0;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
a.project:hover{
  background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2);
  transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.project-title{font-size:0.95rem;font-weight:600;margin-bottom:4px}
.project-desc{font-size:0.78rem;color:#94a3b8}
.project-badge{
  display:inline-block;font-size:0.65rem;font-weight:600;
  letter-spacing:0.05em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;margin-top:8px;
  background:rgba(59,130,246,0.12);color:#3b82f6;border:1px solid rgba(59,130,246,0.2);
}
.footer{margin-top:40px;font-size:0.7rem;color:#475569}
</style>
</head>
<body>
<div class="hub">
  <h1>Global Treasury Projects</h1>
  <div class="sub">Kontoor Brands — Interactive tools & analysis</div>
  <div class="projects">
    <a class="project" href="fx-exposure-analysis/">
      <div class="project-title">FX Exposure Analysis — EUR/PLN Rate Discrepancy</div>
      <div class="project-desc">Interactive flowchart mapping IC sale exposure, Zalando complexity layer, and accounting treatment decision tree.</div>
      <span class="project-badge">Active</span>
    </a>
  </div>
  <div class="footer">Global Treasury &middot; Kontoor Brands</div>
</div>
</body>
</html>
